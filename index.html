<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的小说</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #fdf6ec;
      color: #3e3232;
      max-width: 750px;
      margin: 0 auto;
      padding: 20px;
      line-height: 2;
    }
    .header {
      text-align: center;
      padding: 30px 0 20px;
      border-bottom: 1px solid #d4c5a9;
      margin-bottom: 30px;
    }
    .header h1 {
      font-size: 28px;
      letter-spacing: 4px;
      color: #5a4a3a;
    }
    .header p {
      color: #8b7a6b;
      font-size: 14px;
      margin-top: 6px;
    }
    .toc {
      background: #fffaf2;
      border: 1px solid #e5d9c5;
      border-radius: 8px;
      padding: 20px 24px;
      margin-bottom: 30px;
    }
    .toc h2 {
      font-size: 18px;
      margin-bottom: 14px;
      color: #6b5a4a;
      text-align: center;
    }
    .toc a {
      display: block;
      padding: 8px 0;
      color: #8b6b4a;
      text-decoration: none;
      border-bottom: 1px dashed #e0d3bf;
      transition: 0.2s;
    }
    .toc a:hover { color: #c0392b; padding-left: 8px; }
    .chapter {
      margin-bottom: 40px;
    }
    .chapter h2 {
      font-size: 22px;
      color: #4a3728;
      text-align: center;
      margin-bottom: 18px;
      padding-bottom: 10px;
      border-bottom: 1px dotted #c9b99a;
    }
    .chapter p {
      text-indent: 2em;
      margin-bottom: 12px;
    }
    .footer {
      text-align: center;
      color: #b5a48b;
      font-size: 13px;
      padding: 24px 0;
      border-top: 1px solid #e0d3bf;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>📖 我的小说</h1>
    <p>作者：您的笔名</p>
  </div>

  <!-- 目录 -->
  <div class="toc">
    <h2>📋 目 录</h2>
    <a href="#ch1">第一章 · 故事的开始</a>
    <a href="#ch2">第二章 · 新的旅程</a>
    <a href="#ch3">第三章 · 未完待续</a>
  </div>

  <!-- 第一章 -->
  <div class="chapter" id="ch1">
    <h2>第一章 · 故事的开始</h2>
    <p>（在这里写您的小说内容）</p>
    <p>夜幕低垂，街灯次第亮起。林晚紧了紧外套，快步走过熟悉的巷口……</p>
  </div>

  <!-- 第二章 -->
  <div class="chapter" id="ch2">
    <h2>第二章 · 新的旅程</h2>
    <p>（在这里写您的小说内容）</p>
    <p>第二天清晨，阳光透过窗帘缝隙洒进来……</p>
  </div>

  <!-- 第三章 -->
  <div class="chapter" id="ch3">
    <h2>第三章 · 未完待续</h2>
    <p>（在这里写您的小说内容）</p>
    <p>故事还在继续……</p>
  </div>

  <div class="footer">
    © 2025 我的小说站 · 由 GitHub Pages 驱动
  </div>

</body>
</html>
