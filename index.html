<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>药屋少女的呢喃</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #fdf6ec;
      color: #3e3232;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      line-height: 2;
    }
    .header {
      text-align: center;
      padding: 30px 0 20px;
      border-bottom: 1px solid #d4c5a9;
      margin-bottom: 30px;
    }
    .header h1 {
      font-size: 32px;
      letter-spacing: 6px;
      color: #5a4a3a;
    }
    .header p {
      color: #8b7a6b;
      font-size: 15px;
      margin-top: 8px;
    }
    .stats {
      text-align: center;
      color: #8b7a6b;
      margin-bottom: 20px;
      font-size: 14px;
    }
    .search-box {
      text-align: center;
      margin-bottom: 24px;
    }
    .search-box input {
      width: 70%;
      padding: 10px 16px;
      border: 1px solid #d4c5a9;
      border-radius: 20px;
      font-size: 15px;
      outline: none;
      background: #fffaf2;
    }
    .toc {
      background: #fffaf2;
      border: 1px solid #e5d9c5;
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 30px;
      column-count: 2;
      column-gap: 24px;
    }
    @media (max-width: 500px) {
      .toc { column-count: 1; }
    }
    .toc h2 {
      font-size: 18px;
      margin-bottom: 14px;
      color: #6b5a4a;
      text-align: center;
      column-span: all;
    }
    .toc-item {
      break-inside: avoid;
      padding: 6px 0;
      border-bottom: 1px dashed #e0d3bf;
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
    }
    .toc-item a {
      color: #8b6b4a;
      text-decoration: none;
      transition: 0.2s;
      margin-right: 6px;
    }
    .toc-item a:hover { color: #c0392b; }
    .arc-label {
      color: #3e3232;
      font-size: 13px;
      white-space: nowrap;
    }
    .chapter-content {
      max-width: 700px;
      margin: 0 auto;
    }
    .chapter-content h2 {
      text-align: center;
      font-size: 24px;
      color: #4a3728;
      margin: 30px 0 20px;
      padding-bottom: 12px;
      border-bottom: 1px dotted #c9b99a;
    }
    .chapter-content p {
      text-indent: 2em;
      margin-bottom: 14px;
    }
    .nav-buttons {
      display: flex;
      justify-content: space-between;
      margin: 30px 0;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
    }
    .nav-buttons a {
      background: #8b6b4a;
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      text-decoration: none;
      font-size: 14px;
      transition: 0.2s;
    }
    .nav-buttons a:hover { background: #5a4a3a; }
    .footer {
      text-align: center;
      color: #b5a48b;
      font-size: 13px;
      padding: 24px 0;
      border-top: 1px solid #e0d3bf;
      margin-top: 30px;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>药屋少女的呢喃</h1>
    <p>作者：日向夏（ひゅうが なつ）</p>
  </div>

  <div class="stats">
    📚 共 <strong>293</strong> 章 · 持续更新中<br>
    7月1日 00:36 更103章到壬氏編2完<br>
    7月2日 19:28 更210章到西都編２完<br>
    7月4日 02:32 更293章全完.2026年5月31日完啦<br>各位读者记得记录一下全书看完时间，做最快读完时长有用哦<br>             
    <span style="color: #8b7a6b; font-size: 13px;">建议提出向b站：这有个毛线(自动翻页会做的)</span>
  </div>

  <div class="toc" id="toc">
    <h2>📋 目 录(点章数)</h2>
  </div>

  <div class="footer">
    © 2026 我的小说站 · 由 GitHub Pages 驱动 喜欢就支持一下吧
  </div>

  <span id="busuanzi_value_page_pv" style="display:none;"></span>
  <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>

  <script>
    const totalChapters = 293;

    const arcs = {
      1: '市井編',
      28: '市井編２',
      48: '砂欧編',
      78: '壬氏編',
      104: '壬氏編2',
      127: '西都編',
      176: '西都編２',
      211: '日常篇',
      222: '华佗篇',
      246: '华佗篇2',
      262: '天花篇',
      286: '后事篇',
      293: '2026.5.31',
    };

    const toc = document.getElementById('toc');
    for (let i = 1; i <= totalChapters; i++) {
      const num = String(i).padStart(3, '0');
      const item = document.createElement('div');
      item.className = 'toc-item';
      
      const a = document.createElement('a');
      a.href = `chapters/chapter-${num}.html`;
      a.textContent = `第${i}章`;
      a.setAttribute('data-chapter', `第${i}章`);
      item.appendChild(a);
      
      if (arcs[i]) {
        const label = document.createElement('span');
        label.className = 'arc-label';
        label.textContent = arcs[i];
        item.appendChild(label);
      }
      
      toc.appendChild(item);
    }

    function filterChapters() {
      const keyword = document.getElementById('searchInput').value.toLowerCase();
      const items = toc.querySelectorAll('.toc-item');
      items.forEach(item => {
        const fullText = item.textContent.toLowerCase();
        item.style.display = fullText.includes(keyword) ? 'flex' : 'none';
      });
    }
  </script>

</body>
</html>
