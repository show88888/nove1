<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>药屋少女的呢喃</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #fdf6ec;
      color: #3e3232;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      line-height: 2;
    }
    .header {
      text-align: center;
      padding: 30px 0 20px;
      border-bottom: 1px solid #d4c5a9;
      margin-bottom: 30px;
    }
    .header h1 {
      font-size: 32px;
      letter-spacing: 6px;
      color: #5a4a3a;
    }
    .header p {
      color: #8b7a6b;
      font-size: 15px;
      margin-top: 8px;
    }
    .stats {
      text-align: center;
      color: #8b7a6b;
      margin-bottom: 20px;
      font-size: 14px;
    }
    .search-box {
      text-align: center;
      margin-bottom: 24px;
    }
    .search-box input {
      width: 70%;
      padding: 10px 16px;
      border: 1px solid #d4c5a9;
      border-radius: 20px;
      font-size: 15px;
      outline: none;
      background: #fffaf2;
    }
    .toc {
      background: #fffaf2;
      border: 1px solid #e5d9c5;
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 30px;
      column-count: 2;
      column-gap: 24px;
    }
    @media (max-width: 500px) {
      .toc { column-count: 1; }
    }
    .toc h2 {
      font-size: 18px;
      margin-bottom: 14px;
      color: #6b5a4a;
      text-align: center;
      column-span: all;
    }
    .toc a {
      display: block;
      padding: 6px 0;
      color: #8b6b4a;
      text-decoration: none;
      border-bottom: 1px dashed #e0d3bf;
      transition: 0.2s;
      break-inside: avoid;
    }
    .toc a:hover { color: #c0392b; }
    .chapter-content {
      max-width: 700px;
      margin: 0 auto;
    }
    .chapter-content h2 {
      text-align: center;
      font-size: 24px;
      color: #4a3728;
      margin: 30px 0 20px;
      padding-bottom: 12px;
      border-bottom: 1px dotted #c9b99a;
    }
    .chapter-content p {
      text-indent: 2em;
      margin-bottom: 14px;
    }
    .nav-buttons {
      display: flex;
      justify-content: space-between;
      margin: 30px 0;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
    }
    .nav-buttons a {
      background: #8b6b4a;
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      text-decoration: none;
      font-size: 14px;
      transition: 0.2s;
    }
    .nav-buttons a:hover { background: #5a4a3a; }
    .footer {
      text-align: center;
      color: #b5a48b;
      font-size: 13px;
      padding: 24px 0;
      border-top: 1px solid #e0d3bf;
      margin-top: 30px;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>📖 药屋少女的呢喃</h1>
    <p>作者：日向夏（ひゅうが なつ）</p>
  </div>

  <div class="stats">
    📚 共 <strong>285</strong> 章 · 持续更新中 6月28日 00:48 更77章
    <br>
    <span style="color: #8b7a6b; font-size: 13px;">有问题找b站：这有个毛线</span>
  </div>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="🔍 搜索章节标题..." oninput="filterChapters()">
  </div>

  <div class="toc" id="toc">
    <h2>📋 目 录</h2>
  </div>

  <div class="footer">
    © 2026 我的小说站 · 由 GitHub Pages 驱动 喜欢就支持一下吧
  </div>

  <!-- 隐藏的首页浏览量计数器（读者不可见） -->
  <span id="busuanzi_value_page_pv" style="display:none;"></span>

  <!-- 不蒜子统计脚本 -->
  <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>

  <script>
    const totalChapters = 285;
    const toc = document.getElementById('toc');
    for (let i = 1; i <= totalChapters; i++) {
      const num = String(i).padStart(3, '0');
      const a = document.createElement('a');
      a.href = `chapters/chapter-${num}.html`;
      a.textContent = `第${i}章`;
      a.setAttribute('data-chapter', `第${i}章`);
      toc.appendChild(a);
    }

    function filterChapters() {
      const keyword = document.getElementById('searchInput').value.toLowerCase();
      const links = toc.querySelectorAll('a');
      links.forEach(link => {
        const text = link.getAttribute('data-chapter').toLowerCase();
        link.style.display = text.includes(keyword) ? 'block' : 'none';
      });
    }
  </script>

</body>
</html>
