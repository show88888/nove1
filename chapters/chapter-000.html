<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>访问统计 - 药屋少女的呢喃</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#fdf6ec;color:#3e3232;max-width:700px;margin:0 auto;padding:40px 20px;text-align:center;line-height:2}
.card{background:#fffaf2;border:1px solid #e5d9c5;border-radius:16px;padding:40px 20px;margin:20px 0}
h1{font-size:28px;color:#5a4a3a;margin-bottom:30px}
.stat-item{margin-bottom:24px}
.stat-label{font-size:16px;color:#8b7a6b;margin-bottom:8px}
.stat-number{font-size:48px;font-weight:bold;color:#c0392b}
.home-link{display:inline-block;margin-top:30px;background:#8b6b4a;color:white;padding:10px 30px;border-radius:25px;text-decoration:none;font-size:16px}
.home-link:hover{background:#5a4a3a}
.note{font-size:13px;color:#b5a48b;margin-top:30px}
</style>
</head>
<body>
<h1>📊 本站访问统计</h1>
<p style="color:#8b7a6b;margin-bottom:20px">https://show88888.github.io/nove1/</p>
<div class="card">
<div class="stat-item">
<div class="stat-label">👀 全站总浏览量（PV）</div>
<div class="stat-number"><span id="busuanzi_value_site_pv">...</span></div>
</div>
<div class="stat-item">
<div class="stat-label">🧑 全站总访客数（UV）</div>
<div class="stat-number"><span id="busuanzi_value_site_uv">...</span></div>
</div>
<div class="stat-item">
<div class="stat-label">🏠 首页浏览量</div>
<div class="stat-number" id="home_pv_display">加载中...</div>
</div>
</div>
<a href="../index.html" class="home-link">← 返回目录</a>
<div class="note">统计数据由不蒜子提供，首页数据延迟约几秒更新。</div>
<iframe id="homeFrame" src="../index.html" style="width:0;height:0;border:none;display:none"></iframe>
<script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
<script>
function updateHomePV(){
try{
var d=document.getElementById('homeFrame').contentDocument;
var s=d.getElementById('busuanzi_value_page_pv');
if(s&&s.innerText.trim())document.getElementById('home_pv_display').innerText=s.innerText
}catch(e){}
}
document.getElementById('homeFrame').onload=function(){
updateHomePV();
setInterval(updateHomePV,2000)
}
</script>
</body>
</html>
